; Reference config. The edoburu/pgbouncer image used in docker-compose.yml
; generates its live config from DB_HOST/DB_USER/POOL_MODE env vars, so this
; file documents the intended settings rather than being mounted directly.
[databases]
postgres = host=postgres port=5432 dbname=postgres

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 200
default_pool_size = 20
admin_users = postgres,authenticator
