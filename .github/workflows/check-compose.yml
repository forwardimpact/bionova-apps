name: check-compose

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - run: cp .env.example .env
      - run: docker compose config --quiet
