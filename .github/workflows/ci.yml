name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint:js
      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.8.3"
      - run: bun run lint:deno

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx tsc --noEmit

  coaligned:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      # Enforce the Co-Aligned instruction layers, jobs, and invariants.
      # The CLI ships as the published @forwardimpact/libcoaligned package
      # (bin: coaligned); there is no bare `coaligned` package on npm.
      - run: npx @forwardimpact/libcoaligned

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose config --quiet

  seed-build:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      # The libterrain release carrying prerequisites A+B is not yet on npm;
      # CI installs it from the pinned tarball / local checkout via FIT_TERRAIN.
      # Until then this job documents the determinism gate it will enforce.
      - run: |
          if ! (bunx fit-terrain --help 2>/dev/null | grep -q output-root); then
            echo "::warning::libterrain with --output-root (prereq A) not resolvable from npm yet; skipping seed-build determinism gate"
            exit 0
          fi
          bash scripts/build-seed.sh
          MIG=products/polaris/site/supabase/migrations
          test "$(ls $MIG/20250101*_seed_*.sql | wc -l)" -ge 15
          (cd data/synthetic/.build/products/polaris/site/supabase/migrations \
            && sha256sum -c "$GITHUB_WORKSPACE/data/synthetic/SEED.sha256")
          test -s data/synthetic/seed_embeddings.jsonl
          grep -Eq '[0-9a-f]{40}' data/synthetic/PROVENANCE.md

  edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.8.3"
      - working-directory: services/polaris-functions
        run: deno check main.ts
      - working-directory: services/polaris-functions
        run: deno test --allow-net --allow-read --allow-env .
      - working-directory: services/polaris-functions
        run: deno lint .

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, seed-build, edge-functions]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: cp .env.example .env
      # The libterrain release carrying prereqs A+B is not yet on npm. When it
      # is, drop this guard; until then e2e needs FIT_TERRAIN pointing at a
      # checkout that has `--output-root`, so skip cleanly if unavailable.
      - run: |
          if ! (bunx fit-terrain --help 2>/dev/null | grep -q output-root); then
            echo "::warning::libterrain with --output-root not on npm yet; skipping e2e boot"
            exit 0
          fi
          # Render the seed BEFORE compose up — polaris-functions bind-mounts the JSONL.
          bash scripts/build-seed.sh
          docker compose up -d --wait
          ./setup.sh
          SMOKE_DESTRUCTIVE=1 ./scripts/smoke.sh
      - if: failure()
        run: docker compose logs --tail=200

