name: "Agent: Dispatch"

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [labeled, closed]
  # No `pull_request_review_comment` trigger: a review fires N comment events
  # plus one `pull_request_review.submitted` at once. They share the per-target
  # group below; with cancel-in-progress: false the racing pending runs cancel
  # each other. The `submitted` payload already carries every inline comment.
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      prompt:
        description: "Ad-hoc prompt for the facilitator"
        required: true
        type: string
      discussion_id:
        description: "Stable id for a threaded conversation (bridge path)"
        required: false
        type: string

permissions:
  contents: write

# Coalesce simultaneous events on one target so the recursion guard sees a stable
# thread. cancel-in-progress: false is load-bearing — runs last 30+ minutes and a
# new label or comment mid-run must not cancel that work.
concurrency:
  group: agent-dispatch-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  kata:
    # Only react to labels carrying routing (`agent:*`) or approval (`*:approved`)
    # semantics; classification labels add no request. PR `closed` only on merge.
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'issues' && (github.event.action == 'opened' || (github.event.action == 'labeled' && (startsWith(github.event.label.name, 'agent:') || endsWith(github.event.label.name, ':approved')))))
      || github.event_name == 'issue_comment'
      || (github.event_name == 'pull_request_target' && ((github.event.action == 'labeled' && (startsWith(github.event.label.name, 'agent:') || endsWith(github.event.label.name, ':approved'))) || (github.event.action == 'closed' && github.event.pull_request.merged == true)))
      || github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    # Interim guard for the apm resolve TOCTOU ([Errno 17] File exists:
    # '/home/runner/.apm'): force apm's resolver onto its sequential path so the
    # kata-skills/jidoka-skills resolve cannot race on creating ~/.apm. This job
    # runs `apm install` through the bootstrap action, not scripts/bootstrap.sh
    # (where #90 already sets this), so the workflow must carry the guard itself.
    # Job-level env reaches the composite action's steps; step-level does not. Drop
    # when the durable fix (upstream bootstrap#7: apm 0.12.4 -> v0.23.1) is pinned.
    env:
      APM_RESOLVE_PARALLEL: "1"
    steps:
      - name: Kata killswitch
        shell: bash
        env:
          KATA_KILLSWITCH: ${{ vars.KATA_KILLSWITCH }}
        run: |
          case "$(printf '%s' "${KATA_KILLSWITCH:-}" | tr '[:upper:]' '[:lower:]')" in
            ""|0|false|no|off) ;;
            *) echo "::error::KATA_KILLSWITCH engaged (value: ${KATA_KILLSWITCH})." >&2; exit 1 ;;
          esac
      - name: Generate token
        id: ci-app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          token: ${{ steps.ci-app.outputs.token }}
      # harness runs gemba-harness off PATH and installs nothing; bootstrap
      # installs the CLIs the harness, cost, and wiki-push steps invoke directly.
      # bun-version pins bootstrap's internal setup-bun to the .tool-versions
      # line (bun 1.3.11). Without it, bootstrap forwards its own default to
      # setup-bun, which prepends that bun to PATH; the SessionStart
      # `bun install` in scripts/bootstrap.sh then installs under that ambient
      # bun. A setup-bun placed BEFORE this step cannot win. Bootstrap's
      # internal setup-bun runs after it and overwrites PATH (last writer). The
      # pin must be passed here, on the bootstrap call itself. (#160)
      # Must stay >= 1.2.9: `apm install` calls Bun.YAML.parse, absent in older
      # bun; the 1.2.0 pin took Agent: Dispatch/Docs-Review down (#218).
      - uses: forwardimpact/bootstrap@a5d9098c2a1e68277f02fad39583a34ee003d9c9 # v1.0.18
        with:
          token: ${{ steps.ci-app.outputs.token }}
          app-id: ${{ secrets.KATA_APP_ID }}
          clis: gemba-harness gemba-trace gemba-wiki
          bun-version: "1.3.11"
      - name: Assess and Act
        id: assess
        uses: forwardimpact/harness@f1943c61188049a86436913af157852b70331813 # v1.0.4
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.ci-app.outputs.token }}
          CLAUDE_CODE_USE_BEDROCK: "0"
        with:
          # discuss resumes a thread; otherwise one-shot facilitate.
          mode: ${{ inputs.discussion_id != '' && 'discuss' || 'facilitate' }}
          task-event: ${{ github.event_path }}
          lead-profile: "product-manager"
          agent-profiles: "staff-engineer,security-engineer,technical-writer,release-engineer"
          agent-model: "claude-opus-4-8[1m]"
          lead-model: "claude-opus-4-8[1m]"
          discussion-id: ${{ inputs.discussion_id }}
      - name: Report run cost
        if: always()
        shell: bash
        env:
          TRACE_FILE: ${{ steps.assess.outputs.trace-file }}
        run: |
          gemba-trace cost "$TRACE_FILE" --markdown >> "$GITHUB_STEP_SUMMARY" || true
      # harness does not push wiki itself, so push memory with a fresh token.
      - name: Push wiki changes
        if: always()
        uses: forwardimpact/wiki@ad0042953508240d061ecfb288ce6990247cbd9d # v1.0.2
        with:
          command: push
          app-id: ${{ secrets.KATA_APP_ID }}
          app-private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}
