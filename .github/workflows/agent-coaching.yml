name: "Agent: Coaching"

on:
  workflow_dispatch:
    inputs:
      agent:
        description: "The agent profile to coach"
        required: true
        type: string
      task-amend:
        description: "Additional text appended to the task prompt for steering"
        required: false
        type: string

concurrency:
  group: agent-coaching
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  kata:
    runs-on: ubuntu-latest
    # Interim guard for the apm resolve TOCTOU ([Errno 17] File exists:
    # '/home/runner/.apm'): force apm's resolver onto its sequential path so the
    # kata-skills/jidoka-skills resolve cannot race on creating ~/.apm. kata-agent
    # v1.0.8 runs `apm install` through its bundled forwardimpact/bootstrap@v1.0.18,
    # which still pins apm 0.12.4 (< the 0.15.0 fix), so this path is exposed and
    # must carry the guard itself. Job-level env reaches the composite action's
    # steps; step-level does not. Drop when the durable fix (upstream bootstrap#7:
    # apm 0.12.4 -> v0.23.1) is pinned.
    env:
      APM_RESOLVE_PARALLEL: "1"
    steps:
      # kata-agent runs the killswitch first and reports run cost last.
      - uses: forwardimpact/kata-agent@ffa13d0213523e310605cd4301e364cd70f8393d # v1.0.8
        id: agent
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          app-private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          killswitch: ${{ vars.KATA_KILLSWITCH }}
          mode: "facilitate"
          lead-profile: "improvement-coach"
          agent-profiles: "${{ inputs.agent }}"
          agent-model: "claude-opus-4-8[1m]"
          lead-model: "claude-opus-4-8[1m]"
          wiki: "true"
          task-text: >-
            Facilitate a one-on-one Kata coaching session with "${{ inputs.agent }}".
          task-amend: ${{ inputs.task-amend }}
