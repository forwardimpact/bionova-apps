name: check-context

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  jidoka:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .tool-versions
      - run: bun install
      # Enforce the Jidoka instruction layers, jobs, and invariants. The
      # jidoka bin ships with the pinned @forwardimpact/jidoka
      # devDependency, so the check resolves reproducibly on a clean runner.
      - run: bun run jidoka
