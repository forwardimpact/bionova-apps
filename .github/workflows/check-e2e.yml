name: check-e2e

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .tool-versions
      - run: bun install
      - run: cp .env.example .env
      # The libterrain release carrying prereqs A+B is not yet on npm. When it
      # is, drop this guard; until then e2e needs FIT_TERRAIN pointing at a
      # checkout that has `--output-root`, so skip cleanly if unavailable.
      - run: |
          if ! (bunx fit-terrain --help 2>/dev/null | grep -q output-root); then
            echo "::warning::libterrain with --output-root not on npm yet; skipping e2e boot"
            exit 0
          fi
          # Render the seed BEFORE compose up — polaris-functions bind-mounts the JSONL.
          bash scripts/build-seed.sh
          # The tei container cannot fetch the model itself: it does not trust
          # the runner's TLS-inspecting proxy, so its huggingface.co download
          # fails. The host does trust it, so fetch the model here and point tei
          # at the local copy (the documented workaround in .env.example).
          TEI_MODEL_CACHE="$HOME/.cache/bionova-tei-model/bge-small-en-v1.5" \
            bash scripts/fetch-tei-model.sh
          printf 'TEI_MODEL_ID=/data\nTEI_MODEL_SOURCE=%s\n' \
            "$HOME/.cache/bionova-tei-model/bge-small-en-v1.5" >> .env
          docker compose up -d --wait
          ./setup.sh
          SMOKE_DESTRUCTIVE=1 ./scripts/smoke.sh
      - if: failure()
        run: docker compose logs --tail=200
