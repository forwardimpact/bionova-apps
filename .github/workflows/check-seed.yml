name: check-seed

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  seed-build:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .tool-versions
      - run: bun install
      # fit-terrain@0.1.41 (prereqs A+B) is a devDependency, so `bun install`
      # above drops its bin locally and build-seed.sh resolves it without a live
      # `bunx` fetch. The determinism gate runs for real on every push.
      - run: |
          bash scripts/build-seed.sh
          MIG=products/polaris/site/supabase/migrations
          test "$(ls $MIG/20250101*_seed_*.sql | wc -l)" -ge 15
          (cd data/synthetic/.build/products/polaris/site/supabase/migrations \
            && sha256sum -c "$GITHUB_WORKSPACE/data/synthetic/SEED.sha256")
          test -s data/synthetic/seed_embeddings.jsonl
          grep -Eq '[0-9a-f]{40}' data/synthetic/PROVENANCE.md
