name: check-test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run test:js
      - run: bun run test:site
      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.8.3"
      - run: bun run test:deno
