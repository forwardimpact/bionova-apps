name: deploy

# Railway watch-path deploy: detect which services changed in the push and run
# `railway up --service=<name>` for each. The Railway CLI is pinned to an
# immutable npm version (the `curl | sh` installer resolves a floating latest,
# which we refuse for a workflow that holds the deploy token).
on:
  push:
    branches: [main]

# Deploys run `railway up` with the RAILWAY_TOKEN secret; the GITHUB_TOKEN is
# only used to check out the repo. Least privilege is read-only.
permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
      deploy_enabled: ${{ steps.token.outputs.enabled }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 2 }
      # Gate: this repo is a local sandbox with no live Railway project linked
      # (infrastructure/railway/README.md). Deploy only when a real token is
      # configured, so a red `deploy` once again means a genuine deploy failure
      # rather than the standing empty-token gap. The `secrets` context cannot be
      # read in a job-level `if:`, so surface it through this output instead.
      - id: token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -n "$RAILWAY_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "no RAILWAY_TOKEN configured — skipping deploy (local sandbox, no live Railway project linked)"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - id: changes
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD)
          # Map each watched directory to its real Railway service name (the
          # compose/Railway service key, not always the dir basename).
          declare -A svc=(
            [infrastructure/postgres]=postgres
            [infrastructure/kong]=kong
            [infrastructure/postgrest]=postgrest
            [infrastructure/gotrue]=gotrue
            [infrastructure/storage]=storage
            [infrastructure/tei]=tei
            [products/polaris/site]=polaris-site
            [services/polaris-functions]=polaris-functions
          )
          services=()
          for d in "${!svc[@]}"; do
            if echo "$changed" | grep -q "^$d/"; then services+=("${svc[$d]}"); fi
          done
          # The site bundles the shared handlers; redeploy it when they change.
          if echo "$changed" | grep -q "^products/polaris/handlers/" && [[ ! " ${services[*]} " =~ " polaris-site " ]]; then
            services+=("polaris-site")
          fi
          echo "services=$(printf '%s\n' "${services[@]}" | jq -R -s 'split("\n") | map(select(length>0))' -c)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: detect
    if: needs.detect.outputs.services != '[]' && needs.detect.outputs.deploy_enabled == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: '20' }
      - run: npm install -g @railway/cli@3.20.0
      - run: railway up --service=${{ matrix.service }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
