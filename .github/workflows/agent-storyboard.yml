name: "Agent: Storyboard"

on:
  schedule:
    - cron: "0 6 * * *"  # 08:00 local (Europe/Paris), after the night shift
  workflow_dispatch:
    inputs:
      task-amend:
        description: "Additional text appended to the task prompt for steering"
        required: false
        type: string

concurrency:
  group: agent-storyboard
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  kata:
    runs-on: ubuntu-latest
    steps:
      # kata-agent runs the killswitch first and reports run cost last.
      - uses: forwardimpact/kata-agent@f442ac047fabc0b4bef4e60dddde8bcced8e3ab6 # v1.0.6
        id: agent
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          app-private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          killswitch: ${{ vars.KATA_KILLSWITCH }}
          mode: "discuss"
          lead-profile: "improvement-coach"
          agent-profiles: "product-manager,staff-engineer,security-engineer,technical-writer,release-engineer"
          agent-model: "claude-opus-4-8[1m]"
          lead-model: "claude-opus-4-8[1m]"
          wiki: "true"
          task-text: >-
            Facilitate a team Kata storyboard session.
          task-amend: ${{ inputs.task-amend }}
