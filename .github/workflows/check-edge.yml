name: check-edge

on:
  push:
    branches: [main]
  pull_request:

jobs:
  edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.8.3"
      - working-directory: services/polaris-functions
        run: deno check main.ts
      - working-directory: services/polaris-functions
        run: deno test --allow-net --allow-read --allow-env .
      - working-directory: services/polaris-functions
        run: deno lint .
