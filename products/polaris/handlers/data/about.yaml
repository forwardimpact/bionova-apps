mission: >
  BioNova Polaris connects patients and their clinicians with the clinical
  trials that fit them, using plain-language explanations grounded in each
  trial's own protocol. We exist to make trial discovery legible, not to
  recruit at any cost.
partnerships:
  - BioNova Therapeutics sponsors the oncology and cardiometabolic trial
    programs surfaced here.
  - Site descriptions and consent summaries are reviewed by each
    participating research site before publication.
