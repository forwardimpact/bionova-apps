name: bionova

# Self-hosted Supabase (PG On Rails) stack. One service per infrastructure/
# subdirectory. All services share the default `bionova` network created by
# compose. Secrets come from .env (template: .env.example).

services:
  kong:
    build:
      context: infrastructure/kong
    ports:
      - "8000:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      ANON_KEY: ${ANON_KEY}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    depends_on:
      postgrest:
        condition: service_healthy
      gotrue:
        condition: service_healthy

  postgres:
    build:
      context: infrastructure/postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      TZ: UTC
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    ports:
      - "6432:6432"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: authenticator
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      # The edoburu image defaults LISTEN_PORT to 5432; the mapping, healthcheck,
      # and postgrest's pgbouncer:6432 all expect 6432, so pin it here.
      LISTEN_PORT: "6432"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      AUTH_TYPE: scram-sha-256
      ADMIN_USERS: postgres,authenticator
    healthcheck:
      # Use 127.0.0.1, not localhost: BusyBox nc resolves localhost to ::1
      # first, but pgbouncer binds IPv4 (0.0.0.0) only.
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy

  postgrest:
    image: postgrest/postgrest:v12.0.2
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@pgbouncer:6432/postgres
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      # postgrest runs behind pgbouncer in transaction pooling mode: prepared
      # statements collide (42P05) and LISTEN/NOTIFY can't span pooled txns.
      PGRST_DB_PREPARED_STATEMENTS: "false"
      PGRST_DB_CHANNEL_ENABLED: "false"
    healthcheck:
      # The postgrest image ships only bash (no wget/curl); use a bash TCP probe.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/3000"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      pgbouncer:
        condition: service_healthy

  gotrue:
    image: supabase/gotrue:v2.151.0
    ports:
      - "9999:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: http://localhost:8000
      GOTRUE_DB_DRIVER: postgres
      # Connect directly to postgres, not the transaction pooler: gotrue sends a
      # search_path startup parameter that pgbouncer rejects.
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@postgres:5432/postgres
      GOTRUE_SITE_URL: http://localhost:3001
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9999/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      pgbouncer:
        condition: service_healthy

  realtime:
    image: supabase/realtime:v2.30.34
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      # Realtime (Postgrex) relies on prepared statements; connect directly to
      # postgres rather than the transaction-pooling pgbouncer.
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${REALTIME_SECRET}
      ERL_AFLAGS: -proto_dist inet_tcp
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
    healthcheck:
      # realtime v2.30 has no /api/health route (returns 404); a TCP liveness
      # probe on :4000 is the reliable signal. The image ships bash.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/4000"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      pgbouncer:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  storage-init:
    image: minio/mc:RELEASE.2024-11-05T11-29-45Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init-bucket.sh"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./infrastructure/storage/init-bucket.sh:/init-bucket.sh:ro
    restart: "no"

  storage:
    image: supabase/storage-api:v1.0.6
    ports:
      - "5000:5000"
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://postgrest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      # Direct to postgres, not the pooler: storage-api sends a search_path
      # startup parameter that pgbouncer rejects (FATAL 08P01).
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@postgres:5432/postgres
      FILE_SIZE_LIMIT: "52428800"
      STORAGE_BACKEND: s3
      GLOBAL_S3_BUCKET: trial-documents
      GLOBAL_S3_ENDPOINT: http://minio:9000
      GLOBAL_S3_PROTOCOL: http
      GLOBAL_S3_FORCE_PATH_STYLE: "true"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION: us-east-1
      TENANT_ID: bionova
      REGION: us-east-1
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5000/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      pgbouncer:
        condition: service_healthy
      storage-init:
        condition: service_completed_successfully

  imgproxy:
    image: darthsim/imgproxy:v3.23
    ports:
      - "8081:8080"
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: http://minio:9000
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      storage:
        condition: service_healthy

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    # cpu-1.5 ships linux/amd64 only; emulate on arm64 hosts (Apple Silicon).
    platform: linux/amd64
    # --auto-truncate: some seed condition texts exceed bge-small's 512-token
    # limit; truncate rather than 413-reject (the lead tokens carry the signal).
    command: ["--model-id", "BAAI/bge-small-en-v1.5", "--max-batch-tokens", "16384", "--max-client-batch-size", "16", "--auto-truncate"]
    ports:
      - "8080:80"
    environment:
      MODEL_ID: BAAI/bge-small-en-v1.5
      MAX_BATCH_TOKENS: "16384"
      MAX_CLIENT_BATCH_SIZE: "16"
    volumes:
      - tei-data:/data
    healthcheck:
      # TEI image ships only bash; it binds :80 after the model loads, so a TCP
      # probe is a valid readiness signal. Long start_period covers amd64 emulation.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/80"]
      interval: 10s
      timeout: 10s
      retries: 24
      start_period: 240s

  polaris-functions:
    build:
      context: .
      dockerfile: services/polaris-functions/Dockerfile
    ports:
      - "8082:8000"
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      TEI_URL: http://tei:80
      PGREST_URL: http://kong:8000/rest/v1
    volumes:
      - ./data/synthetic/seed_embeddings.jsonl:/data/synthetic/seed_embeddings.jsonl:ro
      - ./products/polaris/site/supabase/migrations:/data/migrations:ro
    healthcheck:
      # deno image ships only bash; the server binds :8000 on start.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      kong:
        condition: service_healthy
      tei:
        condition: service_healthy

  polaris-site:
    build:
      context: .
      dockerfile: products/polaris/site/Dockerfile
    ports:
      - "3001:3000"
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      TEI_URL: http://tei:80
      NODE_ENV: production
      # The handler's about.yaml is traced into the standalone bundle here; the
      # webpack-rewritten new URL() path is not readable at runtime, so point
      # the handler at the real file. (Path follows outputFileTracingRoot.)
      POLARIS_ABOUT_PATH: /app/products/polaris/handlers/data/about.yaml
    healthcheck:
      # node:20-bookworm-slim runner ships only bash; Next binds :3000 on start.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/3000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      kong:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
  tei-data:
